name: NCF Benchmark Regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'ncf-core/**'
      - 'ncf-io/**'

jobs:
  benchmark:
    name: Benchmark NCF Performance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run benchmark suite
        run: |
          cargo bench --bench ncf_performance -- --noplot --quiet | tee benchmark-output.txt

      - name: Cache benchmark data
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-ncf-benchmark
          restore-keys: |
            ${{ runner.os }}-ncf-benchmark

      - name: Compare benchmark results and report regression
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'NCF Performance'
          tool: 'cargo'
          output-file-path: benchmark-output.txt
          external-data-json-path: .cache/benchmark-data.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on-alert: true
          summary-always: true
          fail-on-alert: true
          alert-threshold: '110%'
          fail-threshold: '110%'
