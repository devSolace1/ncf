name: NCF Benchmark Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Benchmark NCF Performance
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: '0'
      RUSTFLAGS: '-C target-cpu=native'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Gather runner and Rust metadata
        run: |
          echo '--- Runner environment ---'
          uname -a
          echo
          echo '--- CPU details ---'
          lscpu
          echo
          echo '--- Rust toolchain ---'
          rustc -Vv
          cargo -V
          echo
          echo '--- Benchmark dataset configuration ---'
          echo 'Deterministic random payloads with fixed seed, identical NCF and SafeTensors data shapes'

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run benchmark suite
        run: |
          cargo bench --bench ncf_performance --profile release -- --output-format bencher --noplot --warm-up-time 5 --measurement-time 30 --confidence-level 0.99 2>&1 | tee benchmark-output.txt

      - name: Cache benchmark data
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-ncf-benchmark
          restore-keys: |
            ${{ runner.os }}-ncf-benchmark

      - name: Compare benchmark results and report regression
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: 'NCF Performance'
          tool: 'cargo'
          output-file-path: benchmark-output.txt
          external-data-json-path: .cache/benchmark-data.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on-alert: true
          summary-always: true
          fail-on-alert: true
          alert-threshold: '110%'
          fail-threshold: '110%'
